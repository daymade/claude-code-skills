<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reporting reference</title>
  <style>
    :root { --ink: #1f2933; --good: #176b4d; --warn: #9a5b00; --rule: #d8dde3; }
    body { margin: 0; font: 16px/1.45 Arial, sans-serif; color: var(--ink); background: #f7f5ef; }
    main { max-width: 1120px; margin: auto; padding: 48px; }
    h1 { font-size: 30px; }
    .verdict { font-size: 20px; max-width: 680px; }
    .verdict strong { color: var(--warn); }
    .kpis { display: grid; grid-template-columns: repeat(3, 1fr); border-block: 1px solid var(--rule); }
    .kpi { padding: 24px; border-right: 1px solid var(--rule); }
    .kpi:last-child { border-right: 0; }
    .value { font-size: 36px; font-weight: 700; color: var(--good); }
    .note { margin-top: 8px; max-width: 26ch; }
  </style>
</head>
<body>
  <main>
    <h1>Campaign closeout</h1>
    <p class="verdict"><strong>Needs attention:</strong> reach recovered, conversion did not.</p>
    <section class="kpis">
      <div class="kpi"><div class="value">82%</div><div class="note">Reach recovered to the agreed threshold.</div></div>
      <div class="kpi"><div class="value">3.4%</div><div class="note">Conversion remains below the 5% target.</div></div>
      <div class="kpi"><div class="value">12d</div><div class="note">Measurement window ending this Friday.</div></div>
    </section>
  </main>
</body>
</html>
