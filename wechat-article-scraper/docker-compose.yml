# WeChat Article Scraper - Docker Compose
# 一键启动完整抓取环境

version: '3.8'

services:
  scraper:
    build: .
    image: wechat-article-scraper:latest
    container_name: wechat-scraper
    volumes:
      # 输出目录挂载
      - ./output:/app/output
      # 缓存目录持久化
      - cache-data:/app/cache
      # 批量抓取URL列表
      - ./urls.txt:/app/urls.txt:ro
    environment:
      # 日志级别
      - PYTHONUNBUFFERED=1
      # 缓存配置
      - WECHAT_CACHE_TTL=30
      # 代理配置（可选）
      # - HTTP_PROXY=http://proxy:1082
      # - HTTPS_PROXY=http://proxy:1082
    command: --help

  # 定时抓取服务（可选）
  scheduler:
    build: .
    image: wechat-article-scraper:latest
    container_name: wechat-scheduler
    volumes:
      - ./output:/app/output
      - cache-data:/app/cache
      - ./urls.txt:/app/urls.txt:ro
      - ./scripts/scheduler.py:/app/scheduler.py:ro
    environment:
      - PYTHONUNBUFFERED=1
    # 每小时运行一次批量抓取
    command: >
      sh -c "while true; do
        echo \"Starting scheduled scrape at $$(date)\";
        python3 scripts/scraper.py --batch /app/urls.txt -o /app/output --delay 5 || true;
        echo \"Finished at $$(date), sleeping for 1 hour...\";
        sleep 3600;
      done"
    profiles:
      - scheduler
    restart: unless-stopped

volumes:
  cache-data:
    driver: local
